<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Avatar Check</title>
  <style>
    body {
      margin: 0;
      padding: 24px;
      background: #f4f0e8;
      font-family: Georgia, "Times New Roman", serif;
      color: #1f241d;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 18px;
      max-width: 880px;
    }
    .card {
      background: #fffaf2;
      border: 1px solid #ddd3c4;
      border-radius: 20px;
      padding: 16px;
      display: flex;
      align-items: center;
      gap: 16px;
      min-height: 160px;
      box-shadow: 0 10px 30px rgba(76,56,32,.08);
    }
    .avatar {
      width: 120px;
      height: 120px;
      border-radius: 999px;
      overflow: hidden;
      flex: 0 0 auto;
      background: #ece6da;
    }
    .avatar img {
      width: 100%;
      height: 100%;
      display: block;
    }
    .name {
      font-size: 28px;
      font-weight: 700;
      line-height: 1.05;
      margin-bottom: 8px;
    }
    .meta {
      font-size: 16px;
      color: #7a7f7c;
      line-height: 1.35;
    }
  </style>
</head>
<body>
  <div class="grid" id="grid"></div>
  <script src="avatars.js?v=11"></script>
  <script>
    const samples = [
      { name: "Fleet Street Baron", city: "London", company: "Crown Narrative Group", position: "Publisher" },
      { name: "Paris Salon Widow", city: "Paris", company: "Rive Gauche Circle", position: "Host" },
      { name: "Russian Oligarch", city: "Moscow", company: "Volga Metals Group", position: "Chairman" },
      { name: "Jumeirah Family Office Son", city: "Dubai", company: "Dune Crest Holdings", position: "Executive Director" }
    ];
    const grid = document.getElementById('grid');
    for (const contact of samples) {
      const card = document.createElement('div');
      card.className = 'card';
      card.innerHTML = `
        <div class="avatar"><img alt="" src="${window.PinPalAvatar.getDataUri(contact)}"></div>
        <div>
          <div class="name">${contact.name}</div>
          <div class="meta">${contact.position} · ${contact.company}<br>${contact.city}</div>
        </div>
      `;
      grid.appendChild(card);
    }
  </script>
</body>
</html>
